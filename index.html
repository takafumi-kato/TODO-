<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODOリスト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="todo-app">
    <h1>TODOリスト</h1>
    <form id="todo-form" class="todo-form">
      <input id="todo-input" type="text" placeholder="新しいタスクを追加" autocomplete="off">
      <button type="submit">追加</button>
    </form>
    <button id="clear-completed" class="clear-completed">クリア</button>
    <section class="todo-list-section">
      <ul id="todo-list" class="todo-list"></ul>
      <p id="empty-message" class="empty-message">まだタスクがありません。</p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
